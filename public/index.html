<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>QUANTUM ALPHA X | PROFESSIONAL TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --buy: #00ff88; --sell: #ff3344; --bg: #020617; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 380px; background: #070c18; border-right: 1px solid #1e293b; padding: 25px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 25px; display: flex; flex-direction: column; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .signal-box { text-align: center; border-top: 4px solid #334155; transition: 0.5s; }
        .signal-box.buy { border-color: var(--buy); box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); }
        .signal-box.sell { border-color: var(--sell); box-shadow: 0 0 30px rgba(255, 51, 68, 0.1); }
        .price-text { font-size: 4.5rem; font-weight: 900; letter-spacing: -3px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left; }
        .chart-container { flex: 1; position: relative; }
        .news-item { font-size: 0.8rem; color: #94a3b8; padding: 10px 0; border-bottom: 1px solid #1e293b; }
        input { background: #1e293b; border: 1px solid #334155; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="margin:0 0 20px 0; color:var(--buy)">ALPHA X <span style="color:#fff">V3</span></h2>
        <input id="symbol" value="GC=F" placeholder="SYMBOL (e.g. BTC-USD)">
        <div id="signal-container" class="card signal-box">
            <div id="price" class="price-text">0.00</div>
            <div id="signal" style="font-size: 1.5rem; font-weight: bold;">SYNCING...</div>
            <div class="stat-grid" id="stats"></div>
        </div>
        <div class="card" style="flex:1; overflow-y:auto;">
            <div style="font-size:0.7rem; color:#64748b; margin-bottom:10px;">GLOBAL NEWS FEED</div>
            <div id="news"></div>
        </div>
    </div>
    <div class="main">
        <div class="card chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
