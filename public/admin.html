<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>QX - MASTER CONTROL</title>
    <style>
        body { background: #010409; color: #fff; font-family: sans-serif; padding: 50px; text-align: center; }
        .box { background: #0d1117; border: 1px solid #30363d; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #161b22; border: 1px solid #30363d; color: #fff; }
        button { background: #238636; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>MASTER ADMIN</h2>
        <input type="password" id="adminSecret" placeholder="กรอก MASTER KEY">
        <button onclick="generateKey()">สร้างรหัส VIP ใหม่</button>
        <div id="result" style="margin-top:20px; color:#00ff9d; font-size:1.2rem; font-weight:bold;"></div>
    </div>

    <script>
        async function generateKey() {
            const secret = document.getElementById('adminSecret').value;
            const res = await fetch('/api', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "GEN_KEY", adminSecret: secret })
            });
            const data = await res.json();
            document.getElementById('result').innerText = data.newKey || "รหัสแอดมินไม่ถูกต้อง";
        }
    </script>
</body>
</html>
