<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>QUANTUM ALPHA X</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #010409; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0d1117; border: 1px solid #30363d; padding: 30px; border-radius: 15px; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #161b22; border: 1px solid #30363d; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #terminal { display: none; }
    </style>
</head>
<body>

    <div class="card" id="login-box">
        <h2>QUANTUM <span style="color:#00ff9d">ALPHA</span></h2>
        <input type="text" id="pass-key" placeholder="ใส่รหัส VIP (เช่น WIN-99)">
        <button onclick="login()">INITIALIZE TERMINAL</button>
    </div>

    <div class="card" id="terminal">
        <div style="color: #8b949e; font-size: 0.8rem;">XAU/USD SPOT LIVE</div>
        <div id="price" style="font-size: 3rem; font-weight: bold; margin: 20px 0;">0.00</div>
        <div id="signal" style="font-size: 1.5rem; font-weight: bold;">ANALYZING...</div>
    </div>

    <script>
        async function login() {
            const key = document.getElementById('pass-key').value;
            const res = await fetch('/api', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "AUTH", key: key })
            });
            if (res.ok) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('terminal').style.display = 'block';
                setInterval(update, 5000); update();
            } else { alert("รหัสไม่ถูกต้อง!"); }
        }

        async function update() {
            const res = await fetch('/api');
            const d = await res.json();
            document.getElementById('price').innerText = d.price;
            document.getElementById('signal').innerText = d.signal;
            document.getElementById('signal').style.color = d.color;
        }
    </script>
</body>
</html>
